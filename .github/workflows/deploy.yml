name: Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Publish Blazor client
        run: dotnet publish GuessWord.Client/GuessWord.Client.csproj -c Release -o publish/client

      - name: Prepare deploy bundle
        run: |
          mkdir -p deploy_bundle
          cp -r GuessWord.Api deploy_bundle/
          cp -r GuessWord.Shared deploy_bundle/
          cp -r deploy deploy_bundle/
          cp -r publish deploy_bundle/
          cp Dockerfile deploy_bundle/
          cp docker-compose.server.yml deploy_bundle/
          cp .dockerignore deploy_bundle/

      - name: Upload files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "deploy_bundle/*"
          target: "${{ secrets.SERVER_PATH }}"
          strip_components: 1

      - name: Restart application on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd "${{ secrets.SERVER_PATH }}"
            docker-compose -f docker-compose.server.yml down
            docker-compose -f docker-compose.server.yml up -d --build
